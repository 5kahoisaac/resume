# Netlify deployment for the Qwik City app with edge SSR.
#
# `npm run build` runs two Vite passes (see package.json):
#   1. vite build                        → static client assets → dist/
#   2. vite build --config adapters/...  → edge SSR function under
#                                          netlify/edge-functions/ plus its
#                                          manifest.json (routing).
#
# Netlify automatically:
#   - publishes the static assets from `dist`
#   - discovers edge functions in `netlify/edge-functions/`
#   - reads netlify/edge-functions/manifest.json to route all non-static
#     requests ("/*" minus /build/* etc.) through the SSR edge function.
#
# Required environment variables (Netlify UI → Site settings → Environment):
#   EDITOR_PASSWORD  — password for the /editor route
#   AUTH_SECRET      — random secret for signing the session cookie
#                      (generate with: openssl rand -hex 32)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.x"
